<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOLMAR Magazyn ABS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            padding-bottom: 80px;
        }

        /* HEADER */
        header {
            background: #1a1a1a;
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            min-height: 70px;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-icon {
            font-size: 24px;
            cursor: pointer;
        }

        .header-center {
            flex: 1;
            text-align: center;
        }

        .logo-title {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .logo-title .green {
            color: #2ecc71;
        }

        .subtitle {
            font-size: 11px;
            color: #aaa;
            letter-spacing: 1px;
        }

        .header-right {
            font-size: 24px;
            cursor: pointer;
        }

        /* SEARCH & FILTER */
        .search-filter-section {
            background: white;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .search-box {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            background: #f9f9f9;
        }

        .filter-icon {
            font-size: 20px;
            color: #2ecc71;
            cursor: pointer;
        }

        /* CATEGORY SECTION */
        .category-header {
            background: white;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 70px;
            z-index: 50;
        }

        .category-count {
            font-size: 13px;
            color: #999;
            font-weight: normal;
        }

        /* PRODUCT CARD */
        .product-card {
            background: white;
            margin: 12px 12px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            gap: 12px;
            padding: 12px;
        }

        .product-image {
            width: 100px;
            height: 100px;
            border-radius: 6px;
            background: linear-gradient(135deg, #d4d4d4 0%, #f0f0f0 100%);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #bbb;
        }

        .product-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
        }

        .product-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            flex: 1;
        }

        .status-badge {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 12px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-ok {
            background: #e8f8f5;
            color: #27ae60;
        }

        .status-low {
            background: #fef5e7;
            color: #f39c12;
        }

        .status-critical {
            background: #fadbd8;
            color: #c0392b;
        }

        .product-specs {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .product-qty {
            font-size: 20px;
            font-weight: bold;
            color: #2ecc71;
            margin-bottom: 4px;
        }

        .product-qty.low {
            color: #f39c12;
        }

        .product-qty.critical {
            color: #c0392b;
        }

        .product-rolls {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }

        .quick-buttons {
            display: flex;
            gap: 6px;
            justify-content: space-between;
        }

        .qty-btn {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1.5px solid;
            background: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
        }

        .qty-btn.minus {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .qty-btn.minus:active {
            background: #fadbd8;
        }

        .qty-btn.plus {
            border-color: #27ae60;
            color: #27ae60;
        }

        .qty-btn.plus:active {
            background: #d5f4e6;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 70px;
            z-index: 200;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: #999;
            font-size: 12px;
            flex: 1;
            padding: 8px;
            transition: all 0.2s;
        }

        .nav-item.active {
            color: #2ecc71;
        }

        .nav-item i {
            font-size: 20px;
        }

        /* FLOATING ACTION BUTTON */
        .fab {
            position: fixed;
            bottom: 80px;
            left: 12px;
            right: 12px;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
            z-index: 150;
            transition: all 0.3s;
        }

        .fab:active {
            transform: scale(0.95);
        }

        /* VIEWS */
        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        /* FORM */
        .form-container {
            background: white;
            margin: 16px;
            padding: 20px;
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .submit-btn {
            width: 100%;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
            opacity: 0.5;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 12px;
            right: 12px;
            background: #2ecc71;
            color: white;
            padding: 12px 16px;
            border-radius: 6px;
            display: none;
            z-index: 300;
            animation: slideUp 0.3s ease;
        }

        .toast.show {
            display: block;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 600px) {
            .quick-buttons {
                flex-wrap: wrap;
            }

            .qty-btn {
                min-width: 45px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-left">
            <div class="menu-icon">☰</div>
        </div>
        <div class="header-center">
            <div class="logo-title">STOL<span class="green">MAR</span></div>
            <div class="subtitle">MAGAZYN ABS</div>
        </div>
        <div class="header-right">☁️</div>
    </header>

    <!-- SEARCH & FILTER -->
    <div class="search-filter-section">
        <input type="text" class="search-box" id="searchInput" placeholder="Szukaj dekoru, kodu, nazwy...">
        <div class="filter-icon">⚙️</div>
    </div>

    <!-- MAIN CONTENT -->
    <main id="mainView" class="view active">
        <div class="category-header">
            <span>ABS</span>
            <span class="category-count"><span id="materialCount">0</span> pozycji</span>
        </div>
        <div id="productsList"></div>
    </main>

    <div id="addView" class="view">
        <div class="form-container">
            <h2 style="margin-bottom: 20px;">Dodaj nowy dekor</h2>
            <form id="addForm">
                <div class="form-group">
                    <label>Kod/Nazwa:</label>
                    <input type="text" id="productCode" required>
                </div>
                <div class="form-group">
                    <label>Producent:</label>
                    <input type="text" id="productMfg" value="Egger">
                </div>
                <div class="form-group">
                    <label>Grubość (mm):</label>
                    <input type="number" id="productThickness" value="23">
                </div>
                <div class="form-group">
                    <label>Ilość (mb):</label>
                    <input type="number" id="productQty" min="0" required>
                </div>
                <button type="submit" class="submit-btn">✓ Dodaj produkt</button>
            </form>
        </div>
    </div>

    <!-- FAB BUTTON -->
    <button class="fab" id="fabBtn">+ DODAJ NOWY DEKOR</button>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-view="main">
            <i class="fas fa-box"></i>
            <span>Magazyn</span>
        </div>
        <div class="nav-item" data-view="history">
            <i class="fas fa-history"></i>
            <span>Historia</span>
        </div>
        <div class="nav-item" data-view="reports">
            <i class="fas fa-chart-bar"></i>
            <span>Raporty</span>
        </div>
        <div class="nav-item" data-view="settings">
            <i class="fas fa-cog"></i>
            <span>Ustawienia</span>
        </div>
    </nav>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        class Magazine {
            constructor() {
                this.materials = this.loadFromStorage();
            }

            loadFromStorage() {
                const stored = localStorage.getItem('storageMarMaterials');
                return stored ? JSON.parse(stored) : [];
            }

            saveToStorage() {
                localStorage.setItem('storageMarMaterials', JSON.stringify(this.materials));
            }

            addMaterial(code, mfg, thickness, qty) {
                const material = {
                    id: Date.now(),
                    code,
                    mfg,
                    thickness: parseInt(thickness),
                    qty: parseInt(qty),
                    createdAt: new Date().toISOString()
                };
                this.materials.push(material);
                this.saveToStorage();
                return material;
            }

            updateQty(id, delta) {
                const mat = this.materials.find(m => m.id === id);
                if (mat) {
                    mat.qty = Math.max(0, mat.qty + delta);
                    this.saveToStorage();
                    return mat;
                }
                return null;
            }

            getStatus(qty) {
                if (qty > 20) return 'ok';
                if (qty >= 10) return 'low';
                return 'critical';
            }

            search(query) {
                const q = query.toLowerCase();
                return this.materials.filter(m => 
                    m.code.toLowerCase().includes(q) ||
                    m.mfg.toLowerCase().includes(q)
                );
            }

            getRolls(qty) {
                return (qty / 50).toFixed(2);
            }
        }

        class UIController {
            constructor() {
                this.magazine = new Magazine();
                this.currentSearch = '';
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.render();
                console.log('✅ STOLMAR App - załadowano');
            }

            setupEventListeners() {
                // Search
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    this.currentSearch = e.target.value;
                    this.render();
                });

                // FAB & Nav
                document.getElementById('fabBtn').addEventListener('click', () => this.switchView('add'));
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const view = item.dataset.view;
                        if (view === 'main') this.switchView('main');
                        else this.showToast(`📋 ${view.toUpperCase()} - wkrótce`);
                    });
                });

                // Form
                document.getElementById('addForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.addProduct();
                });
            }

            switchView(view) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

                if (view === 'main') {
                    document.getElementById('mainView').classList.add('active');
                    document.querySelector('[data-view="main"]').classList.add('active');
                    this.render();
                } else if (view === 'add') {
                    document.getElementById('addView').classList.add('active');
                }
            }

            render() {
                let materials = this.currentSearch 
                    ? this.magazine.search(this.currentSearch) 
                    : this.magazine.materials;

                document.getElementById('materialCount').textContent = materials.length;
                const container = document.getElementById('productsList');

                if (materials.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i>Brak produktów</div>';
                    return;
                }

                container.innerHTML = materials.map(m => {
                    const status = this.magazine.getStatus(m.qty);
                    const statusText = status === 'ok' ? '✓ OK' : status === 'low' ? '● Niski stan' : '● Bardzo niski';
                    const statusClass = `status-${status}`;
                    const qtyClass = m.qty > 20 ? '' : m.qty >= 10 ? 'low' : 'critical';
                    const rolls = this.magazine.getRolls(m.qty);

                    return `
                        <div class="product-card">
                            <div class="product-image">🟫</div>
                            <div class="product-info">
                                <div class="product-header">
                                    <div class="product-title">${m.code}</div>
                                    <div class="status-badge ${statusClass}">${statusText}</div>
                                </div>
                                <div class="product-specs">Egger ${m.thickness} mm</div>
                                <div class="product-qty ${qtyClass}">${m.qty} <span style="font-size: 14px;">mb</span></div>
                                <div class="product-rolls">${rolls} rolki (z 50 mb)</div>
                                <div class="quick-buttons">
                                    <button class="qty-btn minus" data-id="${m.id}" data-delta="-10">−10</button>
                                    <button class="qty-btn minus" data-id="${m.id}" data-delta="-1">−1</button>
                                    <span style="flex: 1;"></span>
                                    <button class="qty-btn plus" data-id="${m.id}" data-delta="+1">+1</button>
                                    <button class="qty-btn plus" data-id="${m.id}" data-delta="+10">+10</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                // Attach button listeners
                document.querySelectorAll('.qty-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = parseInt(btn.dataset.id);
                        const delta = parseInt(btn.dataset.delta);
                        this.magazine.updateQty(id, delta);
                        this.render();
                    });
                });
            }

            addProduct() {
                const code = document.getElementById('productCode').value;
                const mfg = document.getElementById('productMfg').value;
                const thickness = document.getElementById('productThickness').value;
                const qty = document.getElementById('productQty').value;

                this.magazine.addMaterial(code, mfg, thickness, qty);
                document.getElementById('addForm').reset();
                this.showToast(`✓ ${code} dodany!`);
                setTimeout(() => this.switchView('main'), 500);
            }

            showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            }
        }

        // Init
        const app = new UIController();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
