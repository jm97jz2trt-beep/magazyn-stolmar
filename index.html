<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StolMar Magazyn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        header {
            background-color: #1a1a1a;
            color: white;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header .logo-text {
            font-size: 18px;
            font-weight: bold;
        }

        header .filters {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        header .filters button {
            background-color: #cc3333;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background-color 0.3s;
        }

        header .filters button:hover,
        header .filters button.active {
            background-color: #990000;
        }

        header .search-box {
            flex: 1;
            max-width: 300px;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        main {
            padding: 20px;
            padding-bottom: 80px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .material-card {
            background-color: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 5px solid #ddd;
        }

        .material-card.dobry {
            border-left-color: #28a745;
        }

        .material-card.niski {
            border-left-color: #ffc107;
        }

        .material-card.krytyczny {
            border-left-color: #cc3333;
        }

        .material-card h3 {
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .material-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #666;
        }

        .stock-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .status-icon {
            font-size: 16px;
        }

        .quick-add-section {
            background-color: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
        }

        .quick-add-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .quick-add-group:last-child {
            margin-bottom: 0;
        }

        .quick-add-group label {
            font-size: 13px;
            color: #555;
            min-width: 60px;
        }

        .quick-add-group button {
            background-color: #cc3333;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .quick-add-group button:hover {
            background-color: #990000;
        }

        .quick-add-group button.minus {
            background-color: #666;
        }

        .quick-add-group button.minus:hover {
            background-color: #333;
        }

        .quick-add-group input {
            width: 70px;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #1a1a1a;
            display: flex;
            gap: 0;
            z-index: 101;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.15);
        }

        .bottom-nav button {
            flex: 1;
            background-color: #1a1a1a;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .bottom-nav button:hover,
        .bottom-nav button.active {
            background-color: #cc3333;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #1a1a1a;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        button.submit-btn {
            background-color: #cc3333;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        button.submit-btn:hover {
            background-color: #990000;
        }

        .admin-panel {
            background-color: #f0f0f0;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
        }

        .admin-panel h4 {
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .admin-panel button {
            background-color: #666;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .admin-panel button:hover {
            background-color: #333;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state p {
            margin-top: 10px;
            font-size: 16px;
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 10px;
            }

            header .filters {
                width: 100%;
                flex-wrap: wrap;
            }

            header .search-box {
                max-width: 100%;
            }

            .quick-add-group {
                flex-direction: column;
                align-items: stretch;
            }

            .quick-add-group label {
                min-width: auto;
            }

            .quick-add-group button,
            .quick-add-group input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-text">1STOL MAR</div>
        <div class="filters">
            <input type="text" class="search-box" placeholder="Szukaj..." id="searchInput">
            <button id="filterAll" class="active">Wszystko</button>
            <button id="filterGood">✅ Dobry</button>
            <button id="filterLow">⚠️ Niski</button>
            <button id="filterCritical">🔴 Krytyczny</button>
        </div>
    </header>

    <main>
        <div id="successMessage" class="success-message"></div>
        
        <div id="listView" class="view active">
            <div id="materialsList"></div>
        </div>

        <div id="addView" class="view">
            <h2>Dodaj nowy materiał</h2>
            <form id="addForm">
                <div class="form-group">
                    <label for="materialName">Nazwa materiału:</label>
                    <input type="text" id="materialName" required>
                </div>

                <div class="form-group">
                    <label for="materialType">Typ:</label>
                    <select id="materialType" required>
                        <option value="">-- Wybierz typ --</option>
                        <option value="ABS">ABS</option>
                        <option value="Płyty">Płyty</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="materialQty">Ilość:</label>
                    <input type="number" id="materialQty" min="0" required>
                </div>

                <button type="submit" class="submit-btn">Dodaj materiał</button>
            </form>

            <div class="admin-panel">
                <h4>🔧 Panel Administracyjny</h4>
                <button id="exportBtn">📥 Eksportuj JSON</button>
                <button id="clearBtn">🗑️ Wyczyść dane</button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button id="listBtn" class="active">Lista</button>
        <button id="addBtn">Dodaj</button>
    </nav>

    <script>
        class Magazine {
            constructor() {
                this.materials = this.loadFromStorage();
            }

            loadFromStorage() {
                const stored = localStorage.getItem('storageMarMaterials');
                return stored ? JSON.parse(stored) : [];
            }

            saveToStorage() {
                localStorage.setItem('storageMarMaterials', JSON.stringify(this.materials));
            }

            addMaterial(name, type, qty) {
                const unit = type === 'ABS' ? 'mb' : 'szt';
                const material = {
                    id: Date.now(),
                    name,
                    type,
                    qty: parseInt(qty),
                    unit,
                    createdAt: new Date().toISOString()
                };
                this.materials.push(material);
                this.saveToStorage();
                return material;
            }

            getStatus(qty) {
                if (qty > 20) return 'dobry';
                if (qty >= 10) return 'niski';
                return 'krytyczny';
            }

            quickAddQty(id, amount) {
                const material = this.materials.find(m => m.id === id);
                if (material) {
                    material.qty += parseInt(amount);
                    this.saveToStorage();
                    return material;
                }
                return null;
            }

            quickRemoveQty(id, amount) {
                const material = this.materials.find(m => m.id === id);
                if (material) {
                    material.qty = Math.max(0, material.qty - parseInt(amount));
                    this.saveToStorage();
                    return material;
                }
                return null;
            }

            deleteMaterial(id) {
                this.materials = this.materials.filter(m => m.id !== id);
                this.saveToStorage();
            }

            search(query) {
                const q = query.toLowerCase();
                return this.materials.filter(m => 
                    m.name.toLowerCase().includes(q) || 
                    m.type.toLowerCase().includes(q)
                );
            }

            filterByStatus(status) {
                return this.materials.filter(m => this.getStatus(m.qty) === status);
            }

            exportJSON() {
                return JSON.stringify(this.materials, null, 2);
            }

            clear() {
                this.materials = [];
                this.saveToStorage();
            }
        }

        class UIController {
            constructor() {
                this.magazine = new Magazine();
                this.currentFilter = 'all';
                this.currentSearch = '';
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.renderMaterials();
                console.log('✅ StolMar Magazyn - załadowano pomyślnie');
            }

            setupEventListeners() {
                document.getElementById('listBtn').addEventListener('click', () => this.switchView('list'));
                document.getElementById('addBtn').addEventListener('click', () => this.switchView('add'));

                document.getElementById('filterAll').addEventListener('click', () => this.setFilter('all'));
                document.getElementById('filterGood').addEventListener('click', () => this.setFilter('dobry'));
                document.getElementById('filterLow').addEventListener('click', () => this.setFilter('niski'));
                document.getElementById('filterCritical').addEventListener('click', () => this.setFilter('krytyczny'));

                document.getElementById('searchInput').addEventListener('input', (e) => {
                    this.currentSearch = e.target.value;
                    this.renderMaterials();
                });

                document.getElementById('addForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.addMaterial();
                });

                document.getElementById('exportBtn').addEventListener('click', () => this.exportJSON());
                document.getElementById('clearBtn').addEventListener('click', () => {
                    if (confirm('⚠️ Czy na pewno chcesz usunąć wszystkie dane?')) {
                        this.magazine.clear();
                        this.renderMaterials();
                        this.showSuccess('✅ Dane zostały wyczyszczone');
                    }
                });
            }

            switchView(view) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));

                if (view === 'list') {
                    document.getElementById('listView').classList.add('active');
                    document.getElementById('listBtn').classList.add('active');
                    this.renderMaterials();
                } else {
                    document.getElementById('addView').classList.add('active');
                    document.getElementById('addBtn').classList.add('active');
                }
            }

            setFilter(filter) {
                this.currentFilter = filter;
                document.querySelectorAll('header .filters button').forEach(b => b.classList.remove('active'));
                if (filter === 'all') document.getElementById('filterAll').classList.add('active');
                else if (filter === 'dobry') document.getElementById('filterGood').classList.add('active');
                else if (filter === 'niski') document.getElementById('filterLow').classList.add('active');
                else if (filter === 'krytyczny') document.getElementById('filterCritical').classList.add('active');
                this.renderMaterials();
            }

            addMaterial() {
                const name = document.getElementById('materialName').value;
                const type = document.getElementById('materialType').value;
                const qty = document.getElementById('materialQty').value;

                this.magazine.addMaterial(name, type, qty);
                document.getElementById('addForm').reset();
                this.showSuccess(`✅ ${name} dodany do magazynu!`);
                this.renderMaterials();
                setTimeout(() => this.switchView('list'), 1000);
            }

            renderMaterials() {
                let materials = this.magazine.materials;

                if (this.currentSearch) {
                    materials = this.magazine.search(this.currentSearch);
                } else if (this.currentFilter !== 'all') {
                    materials = this.magazine.filterByStatus(this.currentFilter);
                }

                const container = document.getElementById('materialsList');

                if (materials.length === 0) {
                    container.innerHTML = '<div class="empty-state">📦<p>Brak materiałów</p></div>';
                    return;
                }

                container.innerHTML = materials.map(m => {
                    const status = this.magazine.getStatus(m.qty);
                    const statusText = status === 'dobry' ? '✅ Dobry' : status === 'niski' ? '⚠️ Niski' : '🔴 Krytyczny';
                    const statusColor = status === 'dobry' ? '#28a745' : status === 'niski' ? '#ffc107' : '#cc3333';

                    return `
                        <div class="material-card ${status}">
                            <h3>${m.name}</h3>
                            <div class="material-info">
                                <span><strong>Typ:</strong> ${m.type}</span>
                                <span><strong>Jednostka:</strong> ${m.unit}</span>
                            </div>
                            <div class="stock-status">
                                <span class="status-icon" style="color: ${statusColor};">${statusText}</span>
                                <span style="color: ${statusColor};"><strong>${m.qty} ${m.unit}</strong></span>
                            </div>

                            <div class="quick-add-section">
                                <div class="quick-add-group">
                                    <label>Dodaj:</label>
                                    <input type="number" value="75" class="add-input-${m.id}" style="width: 60px;">
                                    <button class="add-btn-${m.id}">➕ Dodaj</button>
                                </div>
                                <div class="quick-add-group">
                                    <label>Usuń:</label>
                                    <input type="number" value="1" class="remove-input-${m.id}" style="width: 60px;">
                                    <button class="remove-btn-${m.id} minus">➖ Usuń</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                // Attach event listeners to dynamically created buttons
                materials.forEach(m => {
                    document.querySelector(`.add-btn-${m.id}`).addEventListener('click', () => {
                        const qty = parseInt(document.querySelector(`.add-input-${m.id}`).value) || 75;
                        this.magazine.quickAddQty(m.id, qty);
                        this.renderMaterials();
                        this.showSuccess(`✅ Dodano ${qty} ${m.unit} do ${m.name}`);
                    });

                    document.querySelector(`.remove-btn-${m.id}`).addEventListener('click', () => {
                        const qty = parseInt(document.querySelector(`.remove-input-${m.id}`).value) || 1;
                        this.magazine.quickRemoveQty(m.id, qty);
                        this.renderMaterials();
                        this.showSuccess(`✅ Usunięto ${qty} ${m.unit} z ${m.name}`);
                    });
                });
            }

            showSuccess(message) {
                const msg = document.getElementById('successMessage');
                msg.textContent = message;
                msg.classList.add('show');
                setTimeout(() => msg.classList.remove('show'), 3000);
            }

            exportJSON() {
                const json = this.magazine.exportJSON();
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'magazyn_export.json';
                a.click();
                this.showSuccess('✅ JSON został pobrany!');
            }
        }

        // Inicjalizacja
        const app = new UIController();

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => 
                console.log('⚠️ Service Worker błąd:', err)
            );
        }
    </script>
</body>
</html>
